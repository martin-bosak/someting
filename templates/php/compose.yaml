services:
  app:
    container_name: site-${SITE_SLUG}
    build:
      context: ./current
      dockerfile: ../Dockerfile
    env_file:
      - .env
    volumes:
      # Persistent storage; survives redeploys. Host: sites/<slug>/shared
      - ./shared:/data
    restart: unless-stopped
    networks:
      - hosting

networks:
  hosting:
    external: true
    name: someting_hosting
